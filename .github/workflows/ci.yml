name: Package Windows Artifact

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/**
      - assets/**
      - CMakeLists.txt
      - CMakePresets.json
      - config.example.json
      - distribution/**
      - scripts/**
      - src/**
      - vcpkg.json
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/**
      - assets/**
      - CMakeLists.txt
      - CMakePresets.json
      - config.example.json
      - distribution/**
      - scripts/**
      - src/**
      - vcpkg.json
  workflow_dispatch:

jobs:
  package-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up MSVC developer command prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Pin repo-local vcpkg environment
        run: |
          "VCPKG_ROOT=${{ github.workspace }}\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "VCPKG_DEFAULT_BINARY_CACHE=${{ github.workspace }}\.cache\vcpkg\archives" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Ensure Ninja cache directory exists
        run: |
          New-Item -ItemType Directory -Path $env:VCPKG_DEFAULT_BINARY_CACHE -Force | Out-Null

      - name: Cache vcpkg binary artifacts
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: windows-vcpkg-${{ hashFiles('vcpkg.json', 'CMakeLists.txt', 'CMakePresets.json') }}
          restore-keys: |
            windows-vcpkg-

      - name: Bootstrap vcpkg
        run: |
          if (-not (Test-Path -LiteralPath $env:VCPKG_ROOT)) {
            git clone https://github.com/microsoft/vcpkg.git $env:VCPKG_ROOT
          }
          & (Join-Path $env:VCPKG_ROOT 'bootstrap-vcpkg.bat')

      - name: Ensure Ninja is available
        run: |
          if (-not (Get-Command ninja -ErrorAction SilentlyContinue)) {
            choco install ninja --yes
          }

      - name: Package release artifact
        run: .\scripts\package-release.ps1

      - name: Upload packaged release artifact
        uses: actions/upload-artifact@v4
        with:
          name: voxinsert-win-x64-${{ github.sha }}
          path: |
            out/release/VoxInsert-v*-win-x64.zip
            out/release/VoxInsert-v*-win-x64.zip.sha256
          if-no-files-found: error
