name: Publish Windows Release

on:
  push:
    tags:
      - v*

permissions:
  contents: write

jobs:
  publish-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    env:
      VCPKG_ROOT: ${{ github.workspace }}\vcpkg
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}\.cache\vcpkg\archives
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up MSVC developer command prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Ensure vcpkg cache directory exists
        run: |
          New-Item -ItemType Directory -Path $env:VCPKG_DEFAULT_BINARY_CACHE -Force | Out-Null

      - name: Cache vcpkg binary artifacts
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: windows-vcpkg-${{ hashFiles('vcpkg.json', 'CMakeLists.txt', 'CMakePresets.json') }}
          restore-keys: |
            windows-vcpkg-

      - name: Bootstrap vcpkg
        run: |
          git clone --depth 1 https://github.com/microsoft/vcpkg.git $env:VCPKG_ROOT
          & (Join-Path $env:VCPKG_ROOT 'bootstrap-vcpkg.bat')

      - name: Ensure Ninja is available
        run: |
          if (-not (Get-Command ninja -ErrorAction SilentlyContinue)) {
            choco install ninja --yes
          }

      - name: Package tagged release
        run: .\scripts\package-release.ps1 -Version $env:PACKAGE_VERSION
        env:
          PACKAGE_VERSION: ${{ github.ref_name }}

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            out/release/VoxInsert-v*-win-x64.zip
            out/release/VoxInsert-v*-win-x64.zip.sha256
          fail_on_unmatched_files: true
          generate_release_notes: true